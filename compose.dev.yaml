# =============================================================================
# Nikama — compose.dev.yaml
# Stack: PHP 8.4 · NGINX 1.30 · Redis 8 · Node 24 LTS
# Base de datos: PostgreSQL en Supabase (conexión externa, no contenedor local)
# =============================================================================

x-xdebug-args: &xdebug-args
  XDEBUG_ENABLED:  ${XDEBUG_ENABLED:-true}
  XDEBUG_MODE:     ${XDEBUG_MODE:-develop}
  XDEBUG_HOST:     ${XDEBUG_HOST:-host.docker.internal}
  XDEBUG_IDE_KEY:  ${XDEBUG_IDE_KEY:-DOCKER}
  XDEBUG_LOG:      /dev/stdout
  XDEBUG_LOG_LEVEL: 0

x-common-env: &common-env
  env_file:
    - .env

services:

  # ---------------------------------------------------------------------------
  # NGINX 1.30 stable
  # ---------------------------------------------------------------------------
  web:
    image: nginx:1.30-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./:/var/www:cached
      - ./docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nikama-dev
    depends_on:
      php-fpm:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PHP 8.4 FPM — sirve la aplicación Laravel
  # ---------------------------------------------------------------------------
  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        <<: *xdebug-args
    <<: *common-env
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-develop}
      XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
      XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
    volumes:
      - ./:/var/www:cached
    networks:
      - nikama-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Workspace — Artisan, Composer, Vite HMR (Node 24 LTS)
  # ---------------------------------------------------------------------------
  workspace:
    build:
      context: .
      dockerfile: ./docker/development/workspace/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        <<: *xdebug-args
    <<: *common-env
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-develop}
      XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
      XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
    volumes:
      - ./:/var/www:cached
    ports:
      - "${VITE_PORT:-5173}:5173"
    tty: true
    stdin_open: true
    networks:
      - nikama-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 stable — base de datos local para desarrollo
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nikama_db}
      POSTGRES_USER: ${DB_USERNAME:-nikama}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nikama_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - nikama-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 8 stable — caché, sesiones, colas de pedidos
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - nikama-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Mailpit — captura de emails en desarrollo (reemplaza Mailhog)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAIL_PORT:-1025}:1025"   # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025"  # UI web
    networks:
      - nikama-dev
    restart: unless-stopped

networks:
  nikama-dev:
    driver: bridge

volumes:
  redis-dev-data:
  postgres-dev-data:
