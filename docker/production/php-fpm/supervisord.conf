; =============================================================================
; Nikama — Supervisord (PRODUCCIÓN — Universal)
; Gestiona: php-fpm, queue workers, scheduler
# Funciona en cualquier plataforma (Docker Compose, Render, etc.)
; =============================================================================

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

; PHP-FPM — procesa las peticiones PHP de NGINX (vía FastCGI :9000)
[program:php-fpm]
command=/usr/local/sbin/php-fpm --nodaemonize
user=www-data
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Worker para pedidos (alta prioridad)
[program:queue-orders]
command=php /var/www/artisan queue:work redis --queue=orders,default --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000
process_name=%(program_name)s_%(process_num)02d
autostart=true
autorestart=true
numprocs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

; Worker para notificaciones / emails
[program:queue-notifications]
command=php /var/www/artisan queue:work redis --queue=notifications --sleep=5 --tries=3 --max-time=3600 --max-jobs=1000
autostart=true
autorestart=true
numprocs=1
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

; Scheduler de Laravel (reemplaza cron)
[program:scheduler]
command=sh -c "while true; do php /var/www/artisan schedule:run --no-interaction; sleep 60; done"
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
