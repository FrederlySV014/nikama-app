# =============================================================================
# Nikama — Universal Production NGINX Config
# Funciona en cualquier plataforma (Docker Compose, Render, Kubernetes, etc.)
# SSL/TLS se delega al balanceador de carga o proxy inverso de la plataforma
# Puerto: 80 | FastCGI: php-fpm:9000
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=60r/s;

    server {
        listen 80;
        server_name _;

        root  /var/www/public;
        index index.php;

        client_max_body_size 32M;

        # Archivos estáticos — caché agresivo
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            try_files  $uri =404;
        }

        # API REST — rate limit diferenciado
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location / {
            limit_req zone=web burst=30 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files             $uri =404;
            fastcgi_pass          php-fpm:9000;
            fastcgi_index         index.php;
            fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include               fastcgi_params;
            fastcgi_read_timeout  60;
            fastcgi_buffers       16 16k;
            fastcgi_buffer_size   32k;
            fastcgi_hide_header   X-Powered-By;

            # Forward proxy headers (Render, Caddy, Traefik, etc.)
            fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
            fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;
            fastcgi_param  HTTP_X_FORWARDED_HOST  $host;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        # Health check universal
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
